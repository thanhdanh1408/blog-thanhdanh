<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-head :: admin-head(${isEdit ? 'Sửa bài viết' : 'Tạo bài viết mới'})}"></head>
<body class="admin-body">

    <nav th:replace="~{admin/fragments/sidebar :: sidebar(${currentPage})}"></nav>
    <div th:replace="~{admin/fragments/sidebar :: sidebar-overlay}"></div>
    <button th:replace="~{admin/fragments/sidebar :: sidebar-toggle}"></button>

    <main class="admin-content">
        <div class="admin-header">
            <nav class="breadcrumb-nav">
                <a th:href="@{/admin/blogs}"><i class="bi bi-arrow-left me-1"></i>Blog Posts</a>
            </nav>
            <h1 class="admin-title">
                <i class="bi me-2" th:classappend="${isEdit ? 'bi-pencil-square' : 'bi-plus-circle'}"></i>
                <span th:text="${isEdit ? 'Sửa bài viết' : 'Tạo bài viết mới'}">Form</span>
            </h1>
        </div>

        <div class="admin-card">
            <form th:action="${isEdit ? '/admin/blogs/edit/' + blogDTO.id : '/admin/blogs'}"
                  method="post" th:object="${blogDTO}">

                <!-- Title -->
                <div class="mb-3">
                    <label for="title" class="form-label">
                        Tiêu đề <span class="text-danger">*</span>
                    </label>
                    <input type="text" id="title" th:field="*{title}"
                           class="form-control" th:errorclass="is-invalid"
                           placeholder="Nhập tiêu đề bài viết">
                    <div th:if="${#fields.hasErrors('title')}" class="invalid-feedback"
                         th:errors="*{title}">Error</div>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label for="description" class="form-label">
                        Mô tả ngắn <span class="text-danger">*</span>
                    </label>
                    <textarea id="description" th:field="*{description}"
                              class="form-control" th:errorclass="is-invalid"
                              rows="3" placeholder="Mô tả ngắn cho bài viết"></textarea>
                    <div th:if="${#fields.hasErrors('description')}" class="invalid-feedback"
                         th:errors="*{description}">Error</div>
                </div>

                <!-- Content -->
                <div class="mb-3">
                    <label for="content" class="form-label">
                        Nội dung (HTML) <span class="text-danger">*</span>
                    </label>
                    <textarea id="content" th:field="*{content}"
                              class="form-control" th:errorclass="is-invalid"
                              rows="12" placeholder="Nội dung bài viết (hỗ trợ HTML)"></textarea>
                    <div th:if="${#fields.hasErrors('content')}" class="invalid-feedback"
                         th:errors="*{content}">Error</div>
                    <div class="form-text">Hỗ trợ HTML: &lt;p&gt;, &lt;h3&gt;, &lt;ul&gt;, &lt;li&gt;, &lt;strong&gt;, &lt;code&gt;</div>
                </div>

                <!-- Author -->
                <div class="mb-3">
                    <label for="author" class="form-label">Tác giả</label>
                    <input type="text" id="author" th:field="*{author}"
                           class="form-control" th:errorclass="is-invalid"
                           placeholder="Phan Thanh Danh">
                    <div th:if="${#fields.hasErrors('author')}" class="invalid-feedback"
                         th:errors="*{author}">Error</div>
                </div>

                <!-- Tags -->
                <div class="mb-4">
                    <label for="tags" class="form-label">Tags</label>
                    <input type="text" id="tags" th:field="*{tags}"
                           class="form-control"
                           placeholder="Java, Spring Boot, Web Development">
                    <div class="form-text">Phân cách bằng dấu phẩy (,)</div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-admin-primary">
                        <i class="bi me-2" th:classappend="${isEdit ? 'bi-check-circle' : 'bi-plus-circle'}"></i>
                        <span th:text="${isEdit ? 'Cập nhật' : 'Tạo bài viết'}">Submit</span>
                    </button>
                    <a th:href="@{/admin/blogs}" class="btn btn-admin-outline">
                        <i class="bi bi-x-circle me-2"></i>Hủy
                    </a>
                </div>

            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

</body>
</html>
