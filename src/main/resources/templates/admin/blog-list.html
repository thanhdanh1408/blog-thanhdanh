<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-head :: admin-head('Quản lý Blog')}"></head>
<body class="admin-body">

    <nav th:replace="~{admin/fragments/sidebar :: sidebar(${currentPage})}"></nav>
    <div th:replace="~{admin/fragments/sidebar :: sidebar-overlay}"></div>
    <button th:replace="~{admin/fragments/sidebar :: sidebar-toggle}"></button>

    <main class="admin-content">
        <div class="admin-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1 class="admin-title">
                        <i class="bi bi-journal-text me-2"></i>Blog Posts
                    </h1>
                    <p class="admin-subtitle" th:text="'Tổng cộng ' + ${#lists.size(blogs)} + ' bài viết'">0 bài viết</p>
                </div>
                <a th:href="@{/admin/blogs/new}" class="btn btn-admin-primary">
                    <i class="bi bi-plus-circle me-2"></i>Tạo bài viết mới
                </a>
            </div>
        </div>

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${successMessage}">Success</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}">Error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Blog Table -->
        <div class="admin-card">
            <div class="table-responsive">
                <table class="table admin-table" th:if="${!#lists.isEmpty(blogs)}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tiêu đề</th>
                            <th>Ngày đăng</th>
                            <th>Tags</th>
                            <th class="text-end">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="blog : ${blogs}">
                            <td th:text="${blog.id}">1</td>
                            <td>
                                <a th:href="@{/blog/{id}(id=${blog.id})}" target="_blank"
                                   class="table-link" th:text="${blog.title}">Title</a>
                            </td>
                            <td th:text="${blog.publishedDate != null ? #temporals.format(blog.publishedDate, 'dd/MM/yyyy') : '—'}">01/01/2024</td>
                            <td>
                                <span th:each="tag : ${blog.tags}" class="badge-admin-tag" th:text="${tag}">Tag</span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/admin/blogs/edit/{id}(id=${blog.id})}"
                                   class="btn btn-sm btn-admin-edit me-1" title="Sửa">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/blogs/delete/{id}(id=${blog.id})}"
                                   class="btn btn-sm btn-admin-delete"
                                   title="Xóa"
                                   onclick="return confirm('Bạn có chắc muốn xóa bài viết này?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(blogs)}" class="text-center py-5">
                    <i class="bi bi-journal-x" style="font-size: 3rem; color: var(--admin-muted);"></i>
                    <p class="mt-3" style="color: var(--admin-muted);">Chưa có bài viết nào</p>
                    <a th:href="@{/admin/blogs/new}" class="btn btn-admin-primary">
                        <i class="bi bi-plus-circle me-2"></i>Tạo bài viết đầu tiên
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

</body>
</html>
