<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-head :: admin-head('Dashboard')}"></head>
<body class="admin-body">

    <nav th:replace="~{admin/fragments/sidebar :: sidebar(${currentPage})}"></nav>
    <div th:replace="~{admin/fragments/sidebar :: sidebar-overlay}"></div>
    <button th:replace="~{admin/fragments/sidebar :: sidebar-toggle}"></button>

    <main class="admin-content">
        <div class="admin-header">
            <h1 class="admin-title">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </h1>
            <p class="admin-subtitle">Tổng quan hệ thống quản lý blog</p>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="stat-card">
                    <div class="stat-icon stat-blog">
                        <i class="bi bi-journal-text"></i>
                    </div>
                    <div class="stat-info">
                        <h3 class="stat-number" th:text="${blogCount}">0</h3>
                        <p class="stat-label">Bài viết</p>
                    </div>
                    <a th:href="@{/admin/blogs}" class="stat-link">
                        Quản lý <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-card">
                    <div class="stat-icon stat-project">
                        <i class="bi bi-code-slash"></i>
                    </div>
                    <div class="stat-info">
                        <h3 class="stat-number" th:text="${projectCount}">0</h3>
                        <p class="stat-label">Projects</p>
                    </div>
                    <a th:href="@{/admin/projects}" class="stat-link">
                        Quản lý <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="admin-card">
            <h2 class="card-title mb-3">
                <i class="bi bi-lightning-fill me-2"></i>Hành động nhanh
            </h2>
            <div class="d-flex flex-wrap gap-3">
                <a th:href="@{/admin/blogs/new}" class="btn btn-admin-primary">
                    <i class="bi bi-plus-circle me-2"></i>Tạo bài viết mới
                </a>
                <a th:href="@{/admin/projects/new}" class="btn btn-admin-outline">
                    <i class="bi bi-plus-circle me-2"></i>Tạo project mới
                </a>
                <a th:href="@{/}" target="_blank" class="btn btn-admin-outline">
                    <i class="bi bi-eye me-2"></i>Xem Public Site
                </a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

</body>
</html>
