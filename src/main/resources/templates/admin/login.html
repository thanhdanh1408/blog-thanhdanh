<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-head :: admin-head('Đăng nhập')}"></head>
<body class="admin-login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h1>Admin Login</h1>
                <p>Đăng nhập để quản lý blog</p>
            </div>

            <!-- Error Message -->
            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-circle me-2"></i>
                Sai tên đăng nhập hoặc mật khẩu!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Logout Message -->
            <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i>
                Đăng xuất thành công!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/admin/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person me-1"></i>Tên đăng nhập
                    </label>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="Nhập username"
                           required autofocus>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="bi bi-key me-1"></i>Mật khẩu
                    </label>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="Nhập password"
                           required>
                </div>

                <button type="submit" class="btn btn-admin-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                </button>
            </form>

            <div class="login-footer">
                <a th:href="@{/}">
                    <i class="bi bi-arrow-left me-1"></i>Quay về trang chủ
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
