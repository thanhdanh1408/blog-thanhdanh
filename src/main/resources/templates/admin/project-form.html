<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-head :: admin-head(${isEdit ? 'Sửa project' : 'Tạo project mới'})}"></head>
<body class="admin-body">

    <nav th:replace="~{admin/fragments/sidebar :: sidebar(${currentPage})}"></nav>
    <div th:replace="~{admin/fragments/sidebar :: sidebar-overlay}"></div>
    <button th:replace="~{admin/fragments/sidebar :: sidebar-toggle}"></button>

    <main class="admin-content">
        <div class="admin-header">
            <nav class="breadcrumb-nav">
                <a th:href="@{/admin/projects}"><i class="bi bi-arrow-left me-1"></i>Projects</a>
            </nav>
            <h1 class="admin-title">
                <i class="bi me-2" th:classappend="${isEdit ? 'bi-pencil-square' : 'bi-plus-circle'}"></i>
                <span th:text="${isEdit ? 'Sửa project' : 'Tạo project mới'}">Form</span>
            </h1>
        </div>

        <div class="admin-card">
            <form th:action="${isEdit ? '/admin/projects/edit/' + projectDTO.id : '/admin/projects'}"
                  method="post" th:object="${projectDTO}">

                <!-- Name -->
                <div class="mb-3">
                    <label for="name" class="form-label">
                        Tên project <span class="text-danger">*</span>
                    </label>
                    <input type="text" id="name" th:field="*{name}"
                           class="form-control" th:errorclass="is-invalid"
                           placeholder="Nhập tên project">
                    <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback"
                         th:errors="*{name}">Error</div>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label for="description" class="form-label">
                        Mô tả <span class="text-danger">*</span>
                    </label>
                    <textarea id="description" th:field="*{description}"
                              class="form-control" th:errorclass="is-invalid"
                              rows="4" placeholder="Mô tả chi tiết project"></textarea>
                    <div th:if="${#fields.hasErrors('description')}" class="invalid-feedback"
                         th:errors="*{description}">Error</div>
                </div>

                <!-- Technologies -->
                <div class="mb-3">
                    <label for="technologies" class="form-label">Technologies</label>
                    <input type="text" id="technologies" th:field="*{technologies}"
                           class="form-control"
                           placeholder="Java, Spring Boot, MySQL">
                    <div class="form-text">Phân cách bằng dấu phẩy (,)</div>
                </div>

                <!-- GitHub URL -->
                <div class="mb-3">
                    <label for="githubUrl" class="form-label">
                        <i class="bi bi-github me-1"></i>GitHub URL
                    </label>
                    <input type="url" id="githubUrl" th:field="*{githubUrl}"
                           class="form-control" th:errorclass="is-invalid"
                           placeholder="https://github.com/username/repo">
                    <div th:if="${#fields.hasErrors('githubUrl')}" class="invalid-feedback"
                         th:errors="*{githubUrl}">Error</div>
                </div>

                <!-- Demo URL -->
                <div class="mb-3">
                    <label for="demoUrl" class="form-label">
                        <i class="bi bi-box-arrow-up-right me-1"></i>Demo URL
                    </label>
                    <input type="url" id="demoUrl" th:field="*{demoUrl}"
                           class="form-control" th:errorclass="is-invalid"
                           placeholder="https://demo.example.com">
                    <div th:if="${#fields.hasErrors('demoUrl')}" class="invalid-feedback"
                         th:errors="*{demoUrl}">Error</div>
                </div>

                <!-- Image URL -->
                <div class="mb-4">
                    <label for="imageUrl" class="form-label">
                        <i class="bi bi-image me-1"></i>Image URL
                    </label>
                    <input type="url" id="imageUrl" th:field="*{imageUrl}"
                           class="form-control" th:errorclass="is-invalid"
                           placeholder="https://example.com/image.png">
                    <div th:if="${#fields.hasErrors('imageUrl')}" class="invalid-feedback"
                         th:errors="*{imageUrl}">Error</div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-admin-primary">
                        <i class="bi me-2" th:classappend="${isEdit ? 'bi-check-circle' : 'bi-plus-circle'}"></i>
                        <span th:text="${isEdit ? 'Cập nhật' : 'Tạo project'}">Submit</span>
                    </button>
                    <a th:href="@{/admin/projects}" class="btn btn-admin-outline">
                        <i class="bi bi-x-circle me-2"></i>Hủy
                    </a>
                </div>

            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

</body>
</html>
