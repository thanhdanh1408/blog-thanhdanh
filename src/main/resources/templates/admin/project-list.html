<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-head :: admin-head('Quản lý Projects')}"></head>
<body class="admin-body">

    <nav th:replace="~{admin/fragments/sidebar :: sidebar(${currentPage})}"></nav>
    <div th:replace="~{admin/fragments/sidebar :: sidebar-overlay}"></div>
    <button th:replace="~{admin/fragments/sidebar :: sidebar-toggle}"></button>

    <main class="admin-content">
        <div class="admin-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1 class="admin-title">
                        <i class="bi bi-code-slash me-2"></i>Projects
                    </h1>
                    <p class="admin-subtitle" th:text="'Tổng cộng ' + ${#lists.size(projects)} + ' projects'">0 projects</p>
                </div>
                <a th:href="@{/admin/projects/new}" class="btn btn-admin-primary">
                    <i class="bi bi-plus-circle me-2"></i>Tạo project mới
                </a>
            </div>
        </div>

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${successMessage}">Success</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}">Error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Project Table -->
        <div class="admin-card">
            <div class="table-responsive">
                <table class="table admin-table" th:if="${!#lists.isEmpty(projects)}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Technologies</th>
                            <th>GitHub</th>
                            <th class="text-end">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="project : ${projects}">
                            <td th:text="${project.id}">1</td>
                            <td th:text="${project.name}">Name</td>
                            <td>
                                <span th:each="tech : ${project.technologies}" class="badge-admin-tag" th:text="${tech}">Tech</span>
                            </td>
                            <td>
                                <a th:if="${project.githubUrl != null}" th:href="${project.githubUrl}"
                                   target="_blank" class="table-link">
                                    <i class="bi bi-github"></i>
                                </a>
                                <span th:if="${project.githubUrl == null}" class="text-muted">—</span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/admin/projects/edit/{id}(id=${project.id})}"
                                   class="btn btn-sm btn-admin-edit me-1" title="Sửa">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/projects/delete/{id}(id=${project.id})}"
                                   class="btn btn-sm btn-admin-delete"
                                   title="Xóa"
                                   onclick="return confirm('Bạn có chắc muốn xóa project này?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(projects)}" class="text-center py-5">
                    <i class="bi bi-folder-x" style="font-size: 3rem; color: var(--admin-muted);"></i>
                    <p class="mt-3" style="color: var(--admin-muted);">Chưa có project nào</p>
                    <a th:href="@{/admin/projects/new}" class="btn btn-admin-primary">
                        <i class="bi bi-plus-circle me-2"></i>Tạo project đầu tiên
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

</body>
</html>
