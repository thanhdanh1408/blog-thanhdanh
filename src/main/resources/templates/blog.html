<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Blog')}"></head>
<body>

    <!-- Navbar -->
    <nav th:replace="~{fragments/header :: header('blog')}"></nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title" data-animate="fade-up">Blog</h1>
            <p class="page-subtitle" data-animate="fade-up">Chia sẻ kiến thức, kinh nghiệm và hành trình học tập</p>
        </div>
    </section>

    <!-- Blog List -->
    <section class="section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div th:each="blog : ${blogs}" class="blog-card card-glass p-4 mb-4" data-animate="fade-up">
                        <div class="d-flex align-items-center mb-3">
                            <span class="blog-date">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span th:text="${#temporals.format(blog.publishedDate, 'dd/MM/yyyy')}">01/01/2024</span>
                            </span>
                            <span class="blog-author ms-3">
                                <i class="bi bi-person me-1"></i>
                                <span th:text="${blog.author}">Author</span>
                            </span>
                        </div>
                        <h2 class="blog-card-title">
                            <a th:href="@{/blog/{id}(id=${blog.id})}" th:text="${blog.title}">Blog Title</a>
                        </h2>
                        <p class="blog-card-desc" th:text="${blog.description}">Blog description</p>
                        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                            <div class="blog-tags">
                                <span th:each="tag : ${blog.tags}" class="badge-tag" th:text="${tag}">Tag</span>
                            </div>
                            <a th:href="@{/blog/{id}(id=${blog.id})}" class="read-more-link">
                                Đọc tiếp <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${#lists.isEmpty(blogs)}" class="text-center py-5">
                        <i class="bi bi-journal-x display-1 text-muted"></i>
                        <p class="text-muted mt-3">Chưa có bài viết nào.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>

</body>
</html>
