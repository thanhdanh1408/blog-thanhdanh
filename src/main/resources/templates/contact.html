<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Contact')}"></head>
<body>

    <!-- Navbar -->
    <nav th:replace="~{fragments/header :: header('contact')}"></nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title" data-animate="fade-up">Contact</h1>
            <p class="page-subtitle" data-animate="fade-up">Hãy kết nối với tôi qua các kênh liên lạc bên dưới</p>
        </div>
    </section>

    <!-- Contact Info -->
    <section class="section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <!-- Email Card -->
                    <div class="card-glass p-4 mb-4 text-center" data-animate="fade-up">
                        <div class="contact-icon-wrapper mb-3">
                            <i class="bi bi-envelope-fill"></i>
                        </div>
                        <h2 class="h5 mb-2">Email</h2>
                        <a th:href="'mailto:' + ${email}" class="contact-link" th:text="${email}">email@example.com</a>
                    </div>

                    <!-- Social Media Grid -->
                    <h2 class="section-title text-center mb-4" data-animate="fade-up">Social Media</h2>
                    <div class="row g-3 mb-4" data-animate="fade-up">
                        <div th:each="link : ${socialLinks}" class="col-6 col-md-4">
                            <a th:href="${link['url']}" target="_blank" class="social-card card-glass p-4 d-block text-center text-decoration-none">
                                <i class="bi social-icon" th:classappend="${link['icon']}"></i>
                                <p class="social-name mb-0" th:text="${link['name']}">Social</p>
                            </a>
                        </div>
                    </div>

                    <!-- Download CV -->
                    <div class="text-center mt-5" data-animate="fade-up">
                        <h2 class="section-title mb-3">Download CV</h2>
                        <p class="text-muted mb-4">Tải xuống CV của tôi để biết thêm chi tiết</p>
                        <a th:href="${cvUrl}" class="btn btn-primary-custom btn-lg" download>
                            <i class="bi bi-download me-2"></i>Tải CV
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>

</body>
</html>
