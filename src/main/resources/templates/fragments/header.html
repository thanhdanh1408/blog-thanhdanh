<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="header(currentPage)" class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <span class="brand-gradient">&lt;TD /&gt;</span>
        </a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:classappend="${currentPage == 'home' ? 'active' : ''}">
                        <i class="bi bi-house-door me-1"></i>Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/about}" th:classappend="${currentPage == 'about' ? 'active' : ''}">
                        <i class="bi bi-person me-1"></i>About
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/blog}" th:classappend="${currentPage == 'blog' ? 'active' : ''}">
                        <i class="bi bi-journal-text me-1"></i>Blog
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/projects}" th:classappend="${currentPage == 'projects' ? 'active' : ''}">
                        <i class="bi bi-code-slash me-1"></i>Projects
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contact}" th:classappend="${currentPage == 'contact' ? 'active' : ''}">
                        <i class="bi bi-envelope me-1"></i>Contact
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
