<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Home')}"></head>
<body>

    <!-- Navbar -->
    <nav th:replace="~{fragments/header :: header('home')}"></nav>

    <!-- Hero Section -->
    <section class="hero-section" id="hero">
        <div class="hero-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="container">
            <div class="row align-items-center min-vh-100">
                <div class="col-lg-7 hero-content" data-animate="fade-up">
                    <p class="hero-greeting">Xin chào, tôi là</p>
                    <h1 class="hero-name" th:text="${name}">Phan Thanh Danh</h1>
                    <h2 class="hero-title" th:text="${title}">Java Backend Developer</h2>
                    <p class="hero-tagline" th:text="${tagline}">Đam mê xây dựng hệ thống backend.</p>
                    <p class="hero-intro" th:text="${intro}">Giới thiệu ngắn.</p>
                    <div class="hero-buttons">
                        <a th:href="@{/projects}" class="btn btn-primary-custom me-3">
                            <i class="bi bi-code-slash me-2"></i>Xem Projects
                        </a>
                        <a th:href="@{/blog}" class="btn btn-outline-custom">
                            <i class="bi bi-journal-text me-2"></i>Đọc Blog
                        </a>
                    </div>
                </div>
                <div class="col-lg-5 text-center d-none d-lg-block" data-animate="fade-left">
                    <div class="hero-avatar-wrapper">
                        <div class="hero-avatar">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div class="avatar-ring"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="scroll-indicator">
            <a th:href="@{/about}" class="scroll-link">
                <span>Tìm hiểu thêm</span>
                <i class="bi bi-chevron-down"></i>
            </a>
        </div>
    </section>

    <!-- Footer -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>

</body>
</html>
