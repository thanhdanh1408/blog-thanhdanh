<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${blog.title})}"></head>
<body>

    <!-- Navbar -->
    <nav th:replace="~{fragments/header :: header('blog')}"></nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <a th:href="@{/blog}" class="back-link" data-animate="fade-up">
                <i class="bi bi-arrow-left me-2"></i>Quay lại Blog
            </a>
        </div>
    </section>

    <!-- Post Content -->
    <section class="section pt-0">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8" data-animate="fade-up">
                    <article class="post-article">
                        <h1 class="post-title" th:text="${blog.title}">Post Title</h1>

                        <div class="post-meta mb-4">
                            <span class="me-3">
                                <i class="bi bi-person me-1"></i>
                                <span th:text="${blog.author}">Author</span>
                            </span>
                            <span class="me-3">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span th:text="${#temporals.format(blog.publishedDate, 'dd/MM/yyyy')}">01/01/2024</span>
                            </span>
                        </div>

                        <div class="post-tags mb-4">
                            <span th:each="tag : ${blog.tags}" class="badge-tag" th:text="${tag}">Tag</span>
                        </div>

                        <div class="post-content card-glass p-4 p-md-5" th:utext="${blog.content}">
                            Post content goes here.
                        </div>

                        <div class="post-footer mt-4">
                            <a th:href="@{/blog}" class="btn btn-outline-custom">
                                <i class="bi bi-arrow-left me-2"></i>Quay lại danh sách
                            </a>
                        </div>
                    </article>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>

</body>
</html>
